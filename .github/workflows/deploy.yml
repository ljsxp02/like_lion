name: Test, Build, and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_NAME: ljsxp/like_lion

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew clean test --no-daemon

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/ec2_key "$EC2_USERNAME@$EC2_HOST" \
            "IMAGE_NAME='$IMAGE_NAME' IMAGE_TAG='$IMAGE_TAG' bash -s" <<'REMOTE'
          set -euo pipefail

          cd /opt/like-lion
          test -s .env

          docker pull "$IMAGE_NAME:$IMAGE_TAG"
          docker rm --force like-lion-next 2>/dev/null || true
          docker run --detach \
            --name like-lion-next \
            --publish 127.0.0.1:18080:8080 \
            --env-file /opt/like-lion/.env \
            --memory 700m \
            "$IMAGE_NAME:$IMAGE_TAG"

          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:18080/actuator/health >/dev/null; then
              break
            fi
            sleep 2
          done

          if ! curl --fail --silent http://127.0.0.1:18080/actuator/health >/dev/null; then
            docker logs --tail 100 like-lion-next
            docker rm --force like-lion-next
            exit 1
          fi

          docker rm --force like-lion 2>/dev/null || true
          docker rm --force like-lion-next
          docker run --detach \
            --name like-lion \
            --restart unless-stopped \
            --publish 127.0.0.1:8080:8080 \
            --env-file /opt/like-lion/.env \
            --memory 700m \
            "$IMAGE_NAME:$IMAGE_TAG"

          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8080/actuator/health >/dev/null; then
              docker image prune --force
              exit 0
            fi
            sleep 2
          done

          docker logs --tail 100 like-lion
          exit 1
          REMOTE
